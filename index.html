<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flagler College Email Signature Builder</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="bg-gray-100">
  <div class="p-5 md:p-10 min-h-screen">
    <div class="max-w-4xl mx-auto">
      <div class="bg-white p-8 rounded-lg shadow-lg mb-8">
        <h1 class="text-3xl font-bold mb-8" style="color:#7A0019;">Email Signature Builder</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block font-bold mb-2">Full Name</label>
            <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border border-gray-300 rounded">
          </div>
          <div>
            <label class="block font-bold mb-2">Job Title</label>
            <input type="text" id="title" placeholder="Job Title" class="w-full p-3 border border-gray-300 rounded">
          </div>
          <div>
            <label class="block font-bold mb-2">Department</label>
            <input type="text" id="dept" placeholder="Department" class="w-full p-3 border border-gray-300 rounded">
          </div>
          <div>
            <label class="block font-bold mb-2">Phone</label>
            <input type="text" id="phone" placeholder="000-000-0000" class="w-full p-3 border border-gray-300 rounded">
          </div>
          <div>
            <label class="block font-bold mb-2">Email</label>
            <input type="email" id="email" placeholder="email@flagler.edu" class="w-full p-3 border border-gray-300 rounded">
          </div>
          <div>
            <label class="block font-bold mb-2">Office</label>
            <input type="text" id="office" placeholder="Office Location" class="w-full p-3 border border-gray-300 rounded">
          </div>
        </div>
      </div>

      <div class="bg-white p-8 rounded-lg shadow-lg mb-8">
        <h2 class="text-2xl font-bold mb-4" style="color:#7A0019;">Preview</h2>
        <div class="border border-gray-300 p-6 bg-gray-50">
          <table cellpadding="0" cellspacing="0" style="font-family:Arial, sans-serif; width:100%;">
            <tr>
              <td style="vertical-align:top; padding-right:15px; width:100px;">
                <img src="https://www.dropbox.com/scl/fi/7ef45vp7chp0bc4264y3m/FlaglerCollege-DropFlag_Taller.png?rlkey=usxpb6uyfam57rdxrz2op8yvb&raw=1" alt="Flagler" style="width:80px; height:auto;">
              </td>
              <td style="vertical-align:top;">
                <div style="font-size:18px; font-weight:bold; color:#7A0019;"><span id="preview-name">Full Name</span></div>
                <div style="font-size:13px; color:#666; font-style:italic; margin-top:2px;"><span id="preview-title">Job Title</span></div>
                <div style="font-size:13px; color:#666; margin-top:2px;"><span id="preview-dept">Department</span></div>
                <div style="font-size:12px; margin-top:8px;">
                  <strong>P:</strong> <span id="preview-phone">000-000-0000</span> | <strong>E:</strong> <span id="preview-email">email@flagler.edu</span>
                </div>
                <div style="font-size:12px; margin-top:4px;">
                  <strong>Office:</strong> <span id="preview-office">Office Location</span>
                </div>
              </td>
            </tr>
          </table>
        </div>
        <button id="copyBtn" class="mt-4 w-full p-3 rounded text-white font-bold" style="background:#7A0019;">Copy Signature</button>
        <div id="message" class="mt-2 text-green-600"></div>
      </div>
    </div>
  </div>

  <script>
    console.log('Script starting...');
    
    const fields = {
      name: document.getElementById('name'),
      title: document.getElementById('title'),
      dept: document.getElementById('dept'),
      phone: document.getElementById('phone'),
      email: document.getElementById('email'),
      office: document.getElementById('office')
    };

    const previews = {
      name: document.getElementById('preview-name'),
      title: document.getElementById('preview-title'),
      dept: document.getElementById('preview-dept'),
      phone: document.getElementById('preview-phone'),
      email: document.getElementById('preview-email'),
      office: document.getElementById('preview-office')
    };

    console.log('Fields found:', Object.keys(fields).length);
    console.log('Previews found:', Object.keys(previews).length);

    function updatePreview() {
      console.log('Updating preview...');
      previews.name.textContent = fields.name.value || fields.name.placeholder;
      previews.title.textContent = fields.title.value || fields.title.placeholder;
      previews.dept.textContent = fields.dept.value || fields.dept.placeholder;
      previews.phone.textContent = fields.phone.value || fields.phone.placeholder;
      previews.email.textContent = fields.email.value || fields.email.placeholder;
      previews.office.textContent = fields.office.value || fields.office.placeholder;
    }

    Object.values(fields).forEach(field => {
      field.addEventListener('input', updatePreview);
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const preview = document.querySelector('[id^="preview-"]').parentElement.parentElement.parentElement;
      const html = preview.innerHTML;
      
      navigator.clipboard.writeText(html).then(() => {
        const msg = document.getElementById('message');
        msg.textContent = '✓ Copied!';
        setTimeout(() => msg.textContent = '', 2000);
      });
    });

    updatePreview();
    console.log('Script complete');
  </script>
</body>
</html>
